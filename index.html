<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UC Navvy — University of Cincinnati indoor and outdoor campus navigation system with ADA accessible routing.">
  <title>UC Navvy — Campus Navigation</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="anonymous"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/map.css">
</head>
<body>

<div class="app">

  <!-- ════════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header class="header" role="banner">
    <div class="header__logo">
      <div class="header__logomark" aria-hidden="true">UC</div>
      <span class="header__wordmark">Nav<em>vy</em></span>
    </div>

    <span class="header__meta" aria-hidden="true">
      University of Cincinnati — Campus Navigation
    </span>

    <div class="header__status" title="System online" aria-label="Navigation system online">
      <span class="header__status-dot"></span>
      <span>LIVE</span>
    </div>
  </header>

  <!-- ════════════════════════════════════════
       APP BODY
  ════════════════════════════════════════ -->
  <div class="app-body">

    <!-- ── SIDEBAR ──────────────────────────── -->
    <aside class="sidebar" aria-label="Navigation controls">

      <!-- Route Planner -->
      <div class="sidebar__section">
        <div class="section-label" aria-hidden="true">Route Planner</div>

        <!-- START -->
        <div class="route-card" role="group" aria-labelledby="startCardLabel">
          <div class="route-card__label" id="startCardLabel">
            <span class="route-dot route-dot--start" aria-hidden="true"></span>
            Starting Point
          </div>
          <div class="select-row">
            <div class="select-group">
              <label for="startBuilding">Building</label>
              <select id="startBuilding" aria-label="Starting building">
                <option value="">Select building…</option>
              </select>
            </div>
            <!-- TODO: re-enable floor selection once floor data is wired up
            <div class="select-group">
              <label for="startFloor">Floor</label>
              <select id="startFloor" aria-label="Starting floor">
                <option value="">Floor…</option>
              </select>
            </div>
            -->
          </div>
        </div>

        <!-- Visual connector -->
        <div class="route-connector" aria-hidden="true">
          <div class="route-connector__line"></div>
        </div>

        <!-- END -->
        <div class="route-card" role="group" aria-labelledby="endCardLabel">
          <div class="route-card__label" id="endCardLabel">
            <span class="route-dot route-dot--end" aria-hidden="true"></span>
            Destination
          </div>
          <div class="select-row">
            <div class="select-group">
              <label for="endBuilding">Building</label>
              <select id="endBuilding" aria-label="Destination building">
                <option value="">Select building…</option>
              </select>
            </div>
            <!-- TODO: re-enable floor selection once floor data is wired up
            <div class="select-group">
              <label for="endFloor">Floor</label>
              <select id="endFloor" aria-label="Destination floor">
                <option value="">Floor…</option>
              </select>
            </div>
            -->
          </div>
        </div>
      </div>

      <!-- ADA Toggle -->
      <div class="ada-row"
           id="adaToggleRow"
           role="switch"
           aria-checked="false"
           aria-label="Accessible route only"
           tabindex="0">
        <div class="ada-info">
          <div class="ada-title">
            <span class="ada-badge" aria-hidden="true">♿ ADA</span>
            Accessible Route Only
          </div>
          <div class="ada-subtitle">Elevators &amp; ramps — no stairs</div>
        </div>
        <div class="toggle" id="adaToggle" aria-hidden="true">
          <div class="toggle__thumb"></div>
        </div>
      </div>

      <!-- Navigate -->
      <div class="nav-btn-wrap">
        <button class="nav-btn" id="navigateBtn" disabled aria-label="Plan route">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
          </svg>
          Navigate
        </button>
      </div>

      <div class="u-divider" role="separator"></div>

      <!-- Route Summary -->
      <div class="route-summary" id="routeSummary" role="region" aria-label="Route instructions" aria-live="polite">
        <div class="route-summary__header">
          <span class="route-summary__title">▸ Route Instructions</span>
        </div>
        <div class="route-summary__body" id="summarySteps"></div>
      </div>

    </aside>

    <!-- ── MAP AREA ──────────────────────────── -->
    <main class="map-wrap" role="main" aria-label="Campus map">

      <!-- Leaflet map -->
      <div id="map" aria-label="Interactive campus map" role="application"></div>

      <!-- Loading overlay -->
      <div class="loading-overlay" id="loadingOverlay" role="status" aria-label="Loading">
        <div class="spinner" aria-hidden="true"></div>
        <span class="loading-label" id="loadingLabel">Loading…</span>
      </div>

      <!-- Current floor badge -->
      <div class="floor-badge" id="floorBadge" aria-live="polite">
        <strong id="floorBadgeText"></strong>
      </div>

      <!-- Map legend -->
      <div class="map-legend" aria-label="Map legend" role="complementary">
        <div class="map-legend__title">Legend</div>
        <div class="legend-item">
          <div class="legend-line legend-line--floor" aria-hidden="true"></div>
          Floor Plan
        </div>
        <div class="legend-item">
          <div class="legend-line legend-line--start" aria-hidden="true"></div>
          Start Point
        </div>
        <div class="legend-item">
          <div class="legend-line legend-line--end" aria-hidden="true"></div>
          Destination
        </div>
        <div class="legend-item">
          <div class="legend-line legend-line--route" aria-hidden="true"></div>
          Route Path
        </div>
        <div class="legend-item">
          <div class="legend-line legend-line--ada" aria-hidden="true"></div>
          ADA Route
        </div>
      </div>

    </main>

  </div><!-- /.app-body -->

</div><!-- /.app -->

<!-- Toast notification -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- App (ES Modules) -->
<script type="module" src="js/app.js"></script>

</body>
</html>
